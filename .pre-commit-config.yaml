# Pre-commit hooks. Install once:
#
#     pip install pre-commit
#     pre-commit install
#
# Hooks run automatically on `git commit`; run on the whole repo with
# `pre-commit run --all-files`.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        # Snapshot and baseline fixtures are bit-identity-tested;
        # leave their byte content untouched.
        exclude: ^(plans/.*/baselines/|tests/fixtures/funding_snapshots/)
      - id: end-of-file-fixer
        exclude: ^(plans/.*/baselines/|tests/fixtures/funding_snapshots/)
      - id: check-json
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=2000"]
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 24.10.0
    hooks:
      - id: black
